# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                      Version: 2.4.0
# 【改造说明 2026-07-21】
# - report.mode → incremental（增量模式，减少重复推送）
# - filter.method → ai（AI 智能筛选）
# - RSS freshness → 7天（覆盖一周GitHub项目+AI资讯）
# - 新增 AI 资讯 RSS：Hacker News DeepSeek/Qwen/Kimi
# - 新增 GitHub Trending 全语言（更全面追踪AI项目）
# - 禁用不可用源：ruanyifeng（403）
# - Secrets 全部留空，不写入真实密钥
# ═══════════════════════════════════════════════════════════════


# 可视化配置编辑器地址: https://sansan0.github.io/TrendRadar/


# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"
  show_version_update: true


# ===============================================================
# 1.5 调度系统（关闭，由 GitHub Actions cron 控制）
# ===============================================================
schedule:
  enabled: false
  preset: "morning_evening"


# ===============================================================
# 2. 数据源 - 热榜平台
# ===============================================================
platforms:
  enabled: true
  api_url: ""
  sources:
    - id: "toutiao"
      name: "今日头条"
      expected_domain: "toutiao.com"
    - id: "baidu"
      name: "百度热搜"
      expected_domain: "baidu.com"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
      expected_domain: "wallstreetcn.com"
    - id: "thepaper"
      name: "澎湃新闻"
      expected_domain: "thepaper.cn"
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
      expected_domain: "bilibili.com"
    - id: "cls-hot"
      name: "财联社热门"
      expected_domain: "cls.cn"
    - id: "ifeng"
      name: "凤凰网"
      expected_domain: "ifeng.com"
    - id: "tieba"
      name: "贴吧"
      expected_domain: "baidu.com"
    - id: "weibo"
      name: "微博"
      expected_domain: "weibo.com"
    - id: "douyin"
      name: "抖音"
      expected_domain: "douyin.com"
    - id: "zhihu"
      name: "知乎"
      expected_domain: "zhihu.com"


# ===============================================================
# 3. 数据源 - RSS 订阅
#
# 【改造 2026-07-21】
# 新增源:
#   - hacker-news-deepseek   → 覆盖 DeepSeek/Qwen/Kimi 等国内AI动态
#   - github-trending-all    → 全语言GitHub趋势（不限于Python）
#   - hn-show                → Hacker News 项目展示（发现有趣开源项目）
# 禁用源:
#   - ruanyifeng             → 403 不可用
# 保留源:
#   - hacker-news-ai/openai/anthropic  → ✅ 稳定
#   - campus2026 / weloveinterns / campus-recruitment-questions  → ✅ 稳定
# ===============================================================
rss:
  enabled: true

  freshness_filter:
    enabled: true
    max_age_days: 7                    # 覆盖一周内的高star项目和AI资讯

  feeds:
    # === AI 资讯源 ===
    - id: "hacker-news-ai"
      name: "Hacker News AI"
      url: "https://hnrss.org/newest?q=AI%20OR%20LLM%20OR%20agent"

    - id: "hacker-news-openai"
      name: "Hacker News OpenAI"
      url: "https://hnrss.org/newest?q=OpenAI%20OR%20ChatGPT%20OR%20Codex"

    - id: "hacker-news-anthropic"
      name: "Hacker News Anthropic"
      url: "https://hnrss.org/newest?q=Anthropic%20OR%20Claude%20OR%20Claude%20Code"

    - id: "hacker-news-deepseek"
      name: "Hacker News 国产AI"
      url: "https://hnrss.org/newest?q=DeepSeek%20OR%20Qwen%20OR%20Kimi%20OR%20GLM%20OR%20MiniMax"

    - id: "github-trending-python"
      name: "GitHub Trending Python"
      url: "https://mshibanami.github.io/GitHubTrendingRSS/daily/python.xml"

    - id: "github-trending-all"
      name: "GitHub Trending 全语言"
      url: "https://mshibanami.github.io/GitHubTrendingRSS/daily/all.xml"

    - id: "hn-show"
      name: "Hacker News Show"
      url: "https://hnrss.org/show"

    # === 求职实习源 ===
    - id: "campus2026"
      name: "Campus2026 校招更新"
      url: "https://github.com/namewyf/Campus2026/commits/main.atom"

    - id: "weloveinterns"
      name: "WeLoveInterns 实习更新"
      url: "https://github.com/lazyparser/weloveinterns/commits/master.atom"

    - id: "campus-recruitment-questions"
      name: "校招面试题更新"
      url: "https://github.com/0voice/campus_recruitmen_questions/commits/main.atom"

    # === 禁用源（不可用）===
    - id: "ruanyifeng"
      name: "阮一峰的网络日志"
      url: "http://www.ruanyifeng.com/blog/atom.xml"
      enabled: false                  # 403 不可用


# ===============================================================
# 4. 报告模式 — 增量模式，减少重复推送
# ===============================================================
report:
  mode: "incremental"                  # 增量监控，只推送新增内容
  display_mode: "keyword"              # 按关键词分组显示
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 5              # 每个关键词最多显示5条，控制消息长度


# ===============================================================
# 4.5 筛选策略 — AI 智能筛选
# ===============================================================
filter:
  method: "ai"                         # AI 智能分类，适配三大板块需求
  priority_sort_enabled: true


# ===============================================================
# 4.6 AI 智能筛选配置
# ===============================================================
ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7                       # 最低推送分数
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"


# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - hotlist                           # 1️⃣ 热榜区域（含热搜、热点）
    - rss                               # 2️⃣ RSS 订阅区域（含AI资讯、求职实习）
    - ai_analysis                       # 3️⃣ AI 分析区域（日报三大板块输出）

  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: false
    ai_analysis: true                   # AI 分析 → 生成三大板块日报

  standalone:
    platforms: ["zhihu", "weibo"]
    rss_feeds: []
    max_items: 20


# ===============================================================
# 6. 推送通知 — Secrets 留空，通过环境变量注入
# ===============================================================
notification:
  enabled: true

  channels:
    feishu:
      webhook_url: ""                  # 通过 FEISHU_WEBHOOK_URL 环境变量注入

    dingtalk:
      webhook_url: ""

    wework:
      webhook_url: ""
      msg_type: "markdown"

    telegram:
      bot_token: ""
      chat_id: ""

    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""

    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""

    bark:
      url: ""

    slack:
      webhook_url: ""

    generic_webhook:
      webhook_url: ""
      payload_template: ""


# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7


# ===============================================================
# 8. AI 模型配置 — 适配 DeepSeek（通过环境变量注入）
# ===============================================================
ai:
  model: "deepseek/deepseek-v4-flash"   # 默认使用 DeepSeek
  api_key: ""                           # 通过 AI_API_KEY 环境变量注入
  api_base: ""                          # 通过 AI_API_BASE 环境变量注入（可选）
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []


# ===============================================================
# 9. AI 分析功能
# ===============================================================
ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"

  mode: "follow_report"
  max_news_for_analysis: 30             # 控制 token 成本

  include_rss: true                     # ✅ 包含 RSS 进行分析（AI资讯+求职实习）
  include_standalone: true
  include_rank_timeline: true


# ===============================================================
# 10. AI 翻译功能
# ===============================================================
ai_translation:
  enabled: true
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  batch_size: 100
  batch_interval: 2
  scope:
    hotlist: false
    rss: true
    standalone: true


# ===============================================================
# 11. 高级设置
# ===============================================================
advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
